<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Scanner Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .header {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            color: #b0b0b0;
            font-size: 14px;
        }
        .positive { color: #4caf50; }
        .negative { color: #f44336; }
        .controls {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        input {
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            color: white;
            margin: 0 10px;
        }
        .trades-table {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        th {
            color: #b0b0b0;
            font-weight: 500;
        }
        .status-running { color: #4caf50; }
        .status-stopped { color: #f44336; }
        .refresh-timer {
            color: #b0b0b0;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Polymarket Scanner Dashboard</h1>
        <p>Status: <span id="scanner-status" class="status-stopped">●</span> <span id="status-text">Checking...</span> <span class="refresh-timer" id="refresh-timer"></span></p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Balance</div>
            <div class="stat-value" id="balance">$0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Today's P&L</div>
            <div class="stat-value" id="pnl">$0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winrate">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Trades</div>
            <div class="stat-value" id="total-trades">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" onclick="startScanner()">Start Scanner</button>
        <button class="btn-stop" onclick="stopScanner()">Stop Scanner</button>
        <label>Duration (min): <input type="number" id="duration" value="90" min="1" max="1440"></label>
        <label>Max Trades: <input type="number" id="max-trades" value="10" min="1" max="100"></label>
    </div>

    <div class="trades-table">
        <h2>Recent Trades</h2>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Asset</th>
                    <th>Direction</th>
                    <th>Cost</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="trades-body">
                <tr><td colspan="5" style="text-align:center;color:#b0b0b0;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let refreshCountdown = 5;
        
        function updateDashboard() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('scanner-status');
                    const textEl = document.getElementById('status-text');
                    if (data.running) {
                        statusEl.className = 'status-running';
                        textEl.textContent = 'Running';
                    } else {
                        statusEl.className = 'status-stopped';
                        textEl.textContent = 'Stopped';
                    }
                });
            
            fetch('/api/balance')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('balance').textContent = '$' + data.balance.toFixed(2);
                });
            
            fetch('/api/pnl')
                .then(r => r.json())
                .then(data => {
                    const pnlEl = document.getElementById('pnl');
                    const pnl = data.today_pnl;
                    pnlEl.textContent = '$' + pnl.toFixed(2);
                    pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'positive' : 'negative');
                    document.getElementById('winrate').textContent = data.win_rate.toFixed(1) + '%';
                    document.getElementById('total-trades').textContent = data.total_trades;
                });
            
            fetch('/api/trades')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('trades-body');
                    if (data.trades.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#b0b0b0;">No trades yet</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.trades.reverse().slice(0, 20).map(t => {
                        const time = new Date(t.timestamp).toLocaleTimeString();
                        return `<tr>
                            <td>${time}</td>
                            <td>${t.asset}</td>
                            <td>${t.direction}</td>
                            <td>$${(t.S_entry * 2).toFixed(2)}</td>
                            <td>Open</td>
                        </tr>`;
                    }).join('');
                });
            
            refreshCountdown = 5;
        }
        
        function startScanner() {
            const duration = document.getElementById('duration').value;
            const maxTrades = document.getElementById('max-trades').value;
            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({duration: parseInt(duration), max_trades: parseInt(maxTrades)})
            }).then(r => r.json()).then(data => {
                alert(data.message);
                updateDashboard();
            });
        }
        
        function stopScanner() {
            if (confirm('Stop the scanner?')) {
                fetch('/api/stop', {method: 'POST'})
                    .then(r => r.json())
                    .then(data => {
                        alert(data.message);
                        updateDashboard();
                    });
            }
        }
        
        setInterval(() => {
            refreshCountdown--;
            document.getElementById('refresh-timer').textContent = `Refresh in ${refreshCountdown}s`;
            if (refreshCountdown === 0) {
                updateDashboard();
            }
        }, 1000);
        
        updateDashboard();
    </script>
</body>
</html>
